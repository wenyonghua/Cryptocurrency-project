<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统配置管理 - Crypto Platform</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        .layout-container { height: 100vh; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .header-title { font-size: 20px; font-weight: 600; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .toolbar { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .table-container { background: white; border-radius: 8px; padding: 20px; }
    </style>
</head>
<body>
    <div id="app" class="layout-container">
        <div class="header">
            <div class="header-title">⚙️ 系统配置管理</div>
            <div>
                <el-button type="primary" size="small" @click="goBack">返回主页</el-button>
                <el-button type="danger" size="small" @click="logout">退出登录</el-button>
            </div>
        </div>
        <div class="content">
            <div class="toolbar"><el-button type="primary" @click="handleAdd">新增配置</el-button></div>
            <div class="table-container">
                <el-table :data="tableData" border stripe v-loading="loading">
                    <el-table-column prop="id" label="ID" width="80"></el-table-column>
                    <el-table-column prop="configKey" label="配置键" width="200"></el-table-column>
                    <el-table-column prop="configValue" label="配置值" show-overflow-tooltip></el-table-column>
                    <el-table-column prop="configType" label="类型" width="120"></el-table-column>
                    <el-table-column prop="remark" label="备注" width="200" show-overflow-tooltip></el-table-column>
                    <el-table-column prop="updateTime" label="更新时间" width="180"></el-table-column>
                    <el-table-column label="操作" width="200" fixed="right">
                        <template #default="scope">
                            <el-button size="small" @click="handleEdit(scope.row)">编辑</el-button>
                            <el-button size="small" type="danger" @click="handleDelete(scope.row)">删除</el-button>
                        </template>
                    </el-table-column>
                </el-table>
                <el-pagination v-model:current-page="pagination.page" v-model:page-size="pagination.size" :total="pagination.total"
                    layout="total, sizes, prev, pager, next" @size-change="loadData" @current-change="loadData"
                    style="margin-top: 20px; justify-content: flex-end;"></el-pagination>
            </div>
        </div>
        <el-dialog v-model="dialogVisible" :title="dialogTitle" width="600px">
            <el-form :model="formData" label-width="100px">
                <el-form-item label="配置键"><el-input v-model="formData.configKey" :disabled="!!formData.id"></el-input></el-form-item>
                <el-form-item label="配置值"><el-input v-model="formData.configValue" type="textarea"></el-input></el-form-item>
                <el-form-item label="类型"><el-input v-model="formData.configType" placeholder="如：string, number, boolean"></el-input></el-form-item>
                <el-form-item label="备注"><el-input v-model="formData.remark"></el-input></el-form-item>
            </el-form>
            <template #footer>
                <el-button @click="dialogVisible = false">取消</el-button>
                <el-button type="primary" @click="handleSubmit">确定</el-button>
            </template>
        </el-dialog>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.full.js"></script>
    <script src="admin-common.js"></script>
    <script>
        const { createApp, ref, reactive, onMounted } = Vue;
        createApp({
            setup() {
                const loading = ref(false);
                const dialogVisible = ref(false);
                const dialogTitle = ref('新增配置');
                const pagination = reactive({ page: 1, size: 10, total: 0 });
                const tableData = ref([]);
                const formData = reactive({ id: null, configKey: '', configValue: '', configType: 'string', remark: '' });

                const loadData = async () => {
                    loading.value = true;
                    const data = await AdminAPI.getPage('/system/config/list', {}, pagination.page, pagination.size);
                    tableData.value = data.records;
                    pagination.total = data.total;
                    loading.value = false;
                };
                const handleAdd = () => {
                    dialogTitle.value = '新增配置';
                    Object.assign(formData, { id: null, configKey: '', configValue: '', configType: 'string', remark: '' });
                    dialogVisible.value = true;
                };
                const handleEdit = (row) => { dialogTitle.value = '编辑配置'; Object.assign(formData, row); dialogVisible.value = true; };
                const handleSubmit = async () => {
                    const method = formData.id ? 'PUT' : 'POST';
                    const result = await AdminAPI.request('/system/config', { method, body: JSON.stringify(formData) });
                    if (result && result.code === 200) { ElementPlus.ElMessage.success('保存成功'); dialogVisible.value = false; loadData(); }
                };
                const handleDelete = (row) => {
                    ElementPlus.ElMessageBox.confirm('确定删除该配置？', '提示', { type: 'warning' }).then(async () => {
                        const result = await AdminAPI.request(`/system/config/${row.id}`, { method: 'DELETE' });
                        if (result && result.code === 200) { ElementPlus.ElMessage.success('删除成功'); loadData(); }
                    }).catch(() => {});
                };
                const goBack = () => AdminAPI.goBack();
                const logout = () => AdminAPI.logout();
                onMounted(() => { if (AdminAPI.checkAuth()) loadData(); });
                return { loading, dialogVisible, dialogTitle, pagination, tableData, formData, loadData, handleAdd, handleEdit, handleSubmit, handleDelete, goBack, logout };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
